<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trend Filter — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ── Tokens ── */
    :root {
      --font-body: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
      --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
      --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
      --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);
      --space-1:.25rem; --space-2:.5rem; --space-3:.75rem; --space-4:1rem;
      --space-5:1.25rem; --space-6:1.5rem; --space-8:2rem; --space-10:2.5rem; --space-12:3rem;
      --radius-sm:.375rem; --radius-md:.5rem; --radius-lg:.75rem; --radius-full:9999px;
      --transition:180ms cubic-bezier(0.16,1,0.3,1);
    }
    [data-theme="dark"] {
      --bg:#0f1117; --surface:#161920; --surface-2:#1d2029; --surface-3:#252836;
      --border:rgba(255,255,255,0.08); --text:#e2e4f0; --muted:#7a7f96; --faint:#3d4158;
      --accent:#4f98a3; --accent-hover:#63b5c1; --accent-bg:rgba(79,152,163,0.12);
      --high:#e05c6f; --med:#e8a23a; --low:#4caf78;
      --shadow:0 4px 24px rgba(0,0,0,0.4);
    }
    [data-theme="light"] {
      --bg:#f4f5f7; --surface:#ffffff; --surface-2:#f9fafb; --surface-3:#eef0f4;
      --border:rgba(0,0,0,0.08); --text:#1a1d2e; --muted:#5a607a; --faint:#c8cce0;
      --accent:#01696f; --accent-hover:#0c4e54; --accent-bg:rgba(1,105,111,0.10);
      --high:#c0303f; --med:#b87214; --low:#2e7d4f;
      --shadow:0 4px 24px rgba(0,0,0,0.10);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:var(--font-body);font-size:var(--text-base);color:var(--text);background:var(--bg);min-height:100dvh;-webkit-font-smoothing:antialiased}
    img{display:block;max-width:100%}
    button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
    a{color:inherit;text-decoration:none}

    /* ── Layout ── */
    .app{display:flex;min-height:100dvh}
    .sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100dvh;overflow-y:auto;z-index:40}
    .sidebar-logo{padding:var(--space-5) var(--space-5) var(--space-4);display:flex;align-items:center;gap:var(--space-3);border-bottom:1px solid var(--border)}
    .sidebar-logo svg{color:var(--accent);flex-shrink:0}
    .sidebar-logo span{font-size:var(--text-base);font-weight:600;letter-spacing:-0.01em}
    .sidebar-nav{padding:var(--space-4) var(--space-3);flex:1}
    .nav-section-label{font-size:var(--text-xs);color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:var(--space-2);margin-top:var(--space-4);padding:0 var(--space-2)}
    .nav-section-label:first-child{margin-top:0}
    .nav-item{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--muted);transition:background var(--transition),color var(--transition);cursor:pointer;width:100%;text-align:left;margin-bottom:2px}
    .nav-item:hover{background:var(--surface-3);color:var(--text)}
    .nav-item.active{background:var(--accent-bg);color:var(--accent);font-weight:500}
    .nav-item .emoji{font-size:1rem;width:1.25rem;text-align:center}
    .sidebar-footer{padding:var(--space-4) var(--space-3);border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .theme-btn{width:32px;height:32px;border-radius:var(--radius-md);background:var(--surface-3);color:var(--muted);display:flex;align-items:center;justify-content:center;transition:background var(--transition),color var(--transition)}
    .theme-btn:hover{background:var(--accent-bg);color:var(--accent)}
    .main{flex:1;overflow-y:auto;min-width:0}
    .topbar{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border);padding:var(--space-4) var(--space-6);display:flex;align-items:center;justify-content:space-between;gap:var(--space-4)}
    .topbar-left{display:flex;align-items:center;gap:var(--space-3)}
    .topbar-title-group{display:flex;flex-direction:column;gap:2px}
    .topbar-title{font-size:var(--text-lg);font-weight:600;letter-spacing:-0.02em}
    .topbar-meta{font-size:var(--text-xs);color:var(--muted)}
    .topbar-actions{display:flex;align-items:center;gap:var(--space-3)}
    .content{padding:var(--space-6);max-width:1200px}

    /* ── Hamburger (mobile only) ── */
    .hamburger{display:none;width:36px;height:36px;border-radius:var(--radius-md);background:var(--surface-3);color:var(--muted);align-items:center;justify-content:center;flex-shrink:0}
    .hamburger:hover{background:var(--accent-bg);color:var(--accent)}

    /* ── Mobile sidebar overlay ── */
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:39;opacity:0;transition:opacity .25s ease}
    .sidebar-overlay.open{opacity:1}

    /* ── Buttons ── */
    .btn{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:500;transition:background var(--transition),color var(--transition),box-shadow var(--transition)}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{background:var(--accent-hover)}
    .btn-ghost{background:var(--surface-3);color:var(--muted)}
    .btn-ghost:hover{color:var(--text)}
    .btn:disabled{opacity:.5;cursor:not-allowed}

    /* ── KPI bar ── */
    .kpi-bar{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:var(--space-4);margin-bottom:var(--space-6)}
    .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-4)}
    .kpi-label{font-size:var(--text-xs);color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:var(--space-1)}
    .kpi-value{font-size:var(--text-xl);font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-0.03em}
    .kpi-sub{font-size:var(--text-xs);color:var(--muted);margin-top:var(--space-1)}

    /* ── Filter bar ── */
    .filter-bar{display:flex;flex-wrap:wrap;gap:var(--space-3);margin-bottom:var(--space-5);align-items:flex-end}
    .filter-group{display:flex;flex-direction:column;gap:var(--space-1)}
    .filter-label{font-size:var(--text-xs);color:var(--muted);letter-spacing:.04em}
    select,input[type=number],input[type=search]{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text);padding:var(--space-2) var(--space-3);font-size:var(--text-sm);font-family:var(--font-body);outline:none;transition:border-color var(--transition)}
    select:focus,input[type=number]:focus,input[type=search]:focus{border-color:var(--accent)}
    input[type=search]{width:200px}
    input[type=search]::placeholder{color:var(--muted)}

    /* ── Trend grid ── */
    .trend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(340px,100%),1fr));gap:var(--space-4)}
    .trend-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-5);display:flex;flex-direction:column;gap:var(--space-3);transition:box-shadow var(--transition),border-color var(--transition)}
    .trend-card:hover{box-shadow:var(--shadow);border-color:var(--accent)}
    .card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-3)}
    .card-title{font-size:var(--text-base);font-weight:600;line-height:1.3;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
    .urgency-badge{flex-shrink:0;padding:2px var(--space-2);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
    .urgency-high{background:rgba(224,92,111,.15);color:var(--high)}
    .urgency-medium{background:rgba(232,162,58,.15);color:var(--med)}
    .urgency-low{background:rgba(76,175,120,.15);color:var(--low)}
    .card-meta{display:flex;flex-wrap:wrap;align-items:center;gap:var(--space-2)}
    .badge{padding:2px var(--space-2);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:500;background:var(--surface-3);color:var(--muted)}
    .badge-niche{background:var(--accent-bg);color:var(--accent)}

    /* ── Score bars — fill colour matches urgency ── */
    .score-bar{display:flex;flex-direction:column;gap:4px}
    .score-row{display:flex;align-items:center;gap:var(--space-2)}
    .score-row-label{font-size:var(--text-xs);color:var(--muted);width:110px;flex-shrink:0}
    .bar-track{flex:1;height:5px;background:var(--surface-3);border-radius:var(--radius-full);overflow:hidden}
    .bar-fill{height:100%;border-radius:var(--radius-full);transition:width .4s ease}
    .bar-fill.high{background:var(--high)}
    .bar-fill.med {background:var(--med)}
    .bar-fill.low {background:var(--low)}
    .score-num{font-size:var(--text-xs);color:var(--muted);font-variant-numeric:tabular-nums;width:32px;text-align:right}

    .card-brief{font-size:var(--text-sm);color:var(--muted);line-height:1.6;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
    .card-ideas{display:flex;flex-direction:column;gap:var(--space-1)}
    .idea-item{display:flex;align-items:flex-start;gap:var(--space-2);font-size:var(--text-xs);color:var(--muted)}
    .idea-item::before{content:'→';color:var(--accent);flex-shrink:0;margin-top:1px}
    .card-sources{display:flex;flex-wrap:wrap;gap:var(--space-2)}
    .source-chip{padding:1px var(--space-2);border-radius:var(--radius-full);font-size:var(--text-xs);background:var(--surface-3);color:var(--muted)}
    .card-footer{display:flex;justify-content:space-between;align-items:center;padding-top:var(--space-3);border-top:1px solid var(--border)}
    .card-score{font-size:var(--text-base);font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
    .card-actions{display:flex;gap:var(--space-2)}
    .icon-btn{width:32px;height:32px;border-radius:var(--radius-md);background:var(--surface-3);color:var(--muted);display:flex;align-items:center;justify-content:center;transition:background var(--transition),color var(--transition);font-size:.875rem}
    .icon-btn:hover{background:var(--accent-bg);color:var(--accent)}
    .icon-btn.saved{background:var(--accent-bg);color:var(--accent)}

    /* ── Runs table ── */
    .runs-table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse}
    th{font-size:var(--text-xs);color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;text-align:left;padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--border)}
    td{font-size:var(--text-sm);padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:var(--surface-2)}
    .run-status{display:inline-flex;align-items:center;gap:4px;font-size:var(--text-xs);font-weight:600;padding:2px 8px;border-radius:var(--radius-full)}
    .run-done{background:rgba(76,175,120,.15);color:var(--low)}
    .run-pending{background:rgba(232,162,58,.15);color:var(--med)}

    /* ── Empty / Loading ── */
    .empty-state{display:flex;flex-direction:column;align-items:center;text-align:center;padding:var(--space-12) var(--space-8);color:var(--muted)}
    .empty-state .icon{font-size:2.5rem;margin-bottom:var(--space-4);opacity:.5}
    .empty-state h3{color:var(--text);margin-bottom:var(--space-2);font-size:var(--text-base)}
    .empty-state p{max-width:36ch;font-size:var(--text-sm)}
    .skeleton{background:linear-gradient(90deg,var(--surface-3) 25%,var(--surface-2) 50%,var(--surface-3) 75%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:var(--radius-md)}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    .skeleton-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-5);display:flex;flex-direction:column;gap:var(--space-3)}
    .skel-line{height:12px}
    .skel-line.w-60{width:60%}
    .skel-line.w-80{width:80%}
    .skel-line.w-40{width:40%}

    /* ── Toast ── */
    #toast{position:fixed;bottom:var(--space-6);right:var(--space-6);z-index:100;display:flex;flex-direction:column;gap:var(--space-2);pointer-events:none}
    .toast-msg{background:var(--surface-3);color:var(--text);border:1px solid var(--border);padding:var(--space-3) var(--space-4);border-radius:var(--radius-lg);font-size:var(--text-sm);box-shadow:var(--shadow);animation:slideIn .2s ease;pointer-events:auto}
    @keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    /* ── Watchlist panel ── */
    #watchlist-panel{position:fixed;top:0;right:0;bottom:0;width:400px;max-width:100vw;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:50;transform:translateX(100%);transition:transform .3s cubic-bezier(0.16,1,0.3,1);box-shadow:var(--shadow)}
    #watchlist-panel.open{transform:translateX(0)}
    .panel-header{display:flex;align-items:center;justify-content:space-between;padding:var(--space-5);border-bottom:1px solid var(--border)}
    .panel-header h2{font-size:var(--text-base);font-weight:600}
    .panel-body{flex:1;overflow-y:auto;padding:var(--space-4);display:flex;flex-direction:column;gap:var(--space-3)}
    .watchlist-item{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--space-3) var(--space-4);display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-3)}
    .watchlist-item-title{font-size:var(--text-sm);font-weight:500}
    .watchlist-item-meta{font-size:var(--text-xs);color:var(--muted);margin-top:2px}
    .panel-footer{padding:var(--space-4);border-top:1px solid var(--border)}

    /* ── Detail modal ── */
    #modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:60;opacity:0;pointer-events:none;transition:opacity .2s ease;padding:var(--space-4)}
    #modal-overlay.open{opacity:1;pointer-events:all}
    #modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:640px;max-height:90vh;overflow-y:auto;transform:translateY(16px);transition:transform .25s cubic-bezier(0.16,1,0.3,1)}
    #modal-overlay.open #modal{transform:translateY(0)}
    .modal-header{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-4);padding:var(--space-5);border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
    .modal-title{font-size:var(--text-lg);font-weight:600;line-height:1.3;flex:1}
    .modal-body{padding:var(--space-5);display:flex;flex-direction:column;gap:var(--space-5)}
    .modal-section-title{font-size:var(--text-xs);color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:var(--space-2)}
    .action-list{display:flex;flex-direction:column;gap:var(--space-2);counter-reset:steps}
    .action-step{display:flex;align-items:flex-start;gap:var(--space-3);font-size:var(--text-sm);color:var(--text)}
    .action-step::before{counter-increment:steps;content:counter(steps);background:var(--accent-bg);color:var(--accent);border-radius:var(--radius-full);min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:var(--text-xs);font-weight:700;flex-shrink:0}
    .evidence-list{display:flex;flex-direction:column;gap:var(--space-2)}
    .evidence-url{font-size:var(--text-xs);font-family:var(--font-mono);color:var(--accent);word-break:break-all}
    .evidence-url:hover{text-decoration:underline}

    /* ── Auto-poll toggle ── */
    .poll-toggle{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);color:var(--muted)}
    .toggle-switch{position:relative;width:32px;height:18px;cursor:pointer}
    .toggle-switch input{opacity:0;width:0;height:0;position:absolute}
    .toggle-track{position:absolute;inset:0;background:var(--surface-3);border-radius:var(--radius-full);transition:background var(--transition)}
    .toggle-thumb{position:absolute;top:3px;left:3px;width:12px;height:12px;background:#fff;border-radius:50%;transition:transform var(--transition)}
    .toggle-switch input:checked ~ .toggle-track{background:var(--accent)}
    .toggle-switch input:checked ~ .toggle-thumb{transform:translateX(14px)}

    /* ── Responsive ── */
    @media(max-width:768px){
      .sidebar{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%);transition:transform .28s cubic-bezier(0.16,1,0.3,1)}
      .sidebar.open{transform:translateX(0)}
      .sidebar-overlay{display:block}
      .hamburger{display:flex}
      .topbar{padding:var(--space-3) var(--space-4)}
      .topbar-actions .btn-ghost:not(#export-btn){display:none}
      .content{padding:var(--space-4)}
      .kpi-bar{grid-template-columns:repeat(2,1fr)}
      input[type=search]{width:140px}
    }
  </style>
</head>
<body>

<!-- Mobile sidebar overlay -->
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-label="Trend Filter logo">
        <circle cx="14" cy="14" r="13" stroke="currentColor" stroke-width="2"/>
        <path d="M7 18 L11 13 L15 16 L21 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="21" cy="9" r="2.5" fill="currentColor"/>
      </svg>
      <span>Trend Filter</span>
    </div>
    <nav class="sidebar-nav">
      <p class="nav-section-label">Views</p>
      <button class="nav-item active" data-view="trends" onclick="switchView(this,'trends')"><span class="emoji">📊</span> Trends</button>
      <button class="nav-item" data-view="runs" onclick="switchView(this,'runs')"><span class="emoji">🕑</span> Scan History</button>

      <p class="nav-section-label">Niches</p>
      <button class="nav-item" data-niche="" onclick="setNiche(this,'')"><span class="emoji">🔭</span> All Niches</button>
      <button class="nav-item" data-niche="commerce" onclick="setNiche(this,'commerce')"><span class="emoji">🛒</span> Commerce</button>
      <button class="nav-item" data-niche="business" onclick="setNiche(this,'business')"><span class="emoji">💡</span> Business</button>
      <button class="nav-item" data-niche="tech_ai" onclick="setNiche(this,'tech_ai')"><span class="emoji">🤖</span> Tech & AI</button>
      <button class="nav-item" data-niche="content" onclick="setNiche(this,'content')"><span class="emoji">🎬</span> Content</button>
      <button class="nav-item" data-niche="general" onclick="setNiche(this,'general')"><span class="emoji">🌍</span> General</button>
    </nav>
    <div class="sidebar-footer">
      <span style="font-size:var(--text-xs);color:var(--muted)" id="live-clock"></span>
      <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme" id="theme-btn">
        <span id="theme-icon">☀️</span>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <!-- hamburger: mobile only -->
        <button class="hamburger" onclick="openSidebar()" aria-label="Open menu">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="2" y1="4" x2="16" y2="4"/>
            <line x1="2" y1="9" x2="16" y2="9"/>
            <line x1="2" y1="14" x2="16" y2="14"/>
          </svg>
        </button>
        <div class="topbar-title-group">
          <div class="topbar-title" id="page-title">Trends</div>
          <div class="topbar-meta" id="page-meta">Loading…</div>
        </div>
      </div>
      <div class="topbar-actions">
        <label class="poll-toggle" title="Auto-refresh every 5 min">
          <label class="toggle-switch">
            <input type="checkbox" id="auto-poll" onchange="toggleAutoPoll()">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
          Auto
        </label>
        <button class="btn btn-ghost" id="export-btn" onclick="exportCSV()">⬇ Export</button>
        <button class="btn btn-ghost" onclick="openWatchlist()">📌 <span id="wl-count" style="background:var(--accent-bg);color:var(--accent);border-radius:var(--radius-full);padding:1px 7px;font-size:var(--text-xs);margin-left:2px">0</span></button>
        <button class="btn btn-primary" id="scan-btn" onclick="runScan()">▶ Scan</button>
      </div>
    </header>

    <main class="content">
      <!-- KPIs -->
      <div class="kpi-bar">
        <div class="kpi-card"><div class="kpi-label">Total Trends</div><div class="kpi-value" id="kpi-total">—</div><div class="kpi-sub" id="kpi-total-sub">last 24h</div></div>
        <div class="kpi-card"><div class="kpi-label">High Urgency</div><div class="kpi-value" id="kpi-high" style="color:var(--high)">—</div><div class="kpi-sub">score ≥ 0.70</div></div>
        <div class="kpi-card"><div class="kpi-label">Avg Score</div><div class="kpi-value" id="kpi-avg">—</div><div class="kpi-sub">this window</div></div>
        <div class="kpi-card"><div class="kpi-label">Last Scan</div><div class="kpi-value" id="kpi-last" style="font-size:var(--text-base)">—</div><div class="kpi-sub" id="kpi-last-sub">—</div></div>
      </div>

      <!-- Trends view -->
      <div id="view-trends">
        <div class="filter-bar">
          <div class="filter-group">
            <span class="filter-label">Search</span>
            <input type="search" id="filter-search" placeholder="keyword…" oninput="renderGrid(allTrends)">
          </div>
          <div class="filter-group">
            <span class="filter-label">Signal Type</span>
            <select id="filter-type" onchange="applyFilters()">
              <option value="">All types</option>
              <option value="rising_topic">Rising Topic</option>
              <option value="commercial_intent">Commercial Intent</option>
              <option value="viral_content">Viral Content</option>
              <option value="new_product">New Product</option>
              <option value="search_surge">Search Surge</option>
            </select>
          </div>
          <div class="filter-group">
            <span class="filter-label">Urgency</span>
            <select id="filter-urgency" onchange="applyFilters()">
              <option value="">All urgency</option>
              <option value="high">🔴 High</option>
              <option value="medium">🟡 Medium</option>
              <option value="low">🟢 Low</option>
            </select>
          </div>
          <div class="filter-group">
            <span class="filter-label">Time window (h)</span>
            <input type="number" id="filter-hours" value="24" min="1" max="720" style="width:80px" onchange="applyFilters()" />
          </div>
          <div class="filter-group">
            <span class="filter-label">Sort by</span>
            <select id="filter-sort" onchange="renderGrid(allTrends)">
              <option value="score">Score</option>
              <option value="growth">Growth</option>
              <option value="commercial_intent">Commercial Intent</option>
              <option value="novelty">Novelty</option>
            </select>
          </div>
        </div>
        <div id="trend-grid" class="trend-grid"></div>
      </div>

      <!-- Runs view -->
      <div id="view-runs" style="display:none">
        <div class="runs-table-wrap">
          <table id="runs-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Started</th>
                <th>Finished</th>
                <th>Duration</th>
                <th>Signals</th>
                <th>Clusters</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="runs-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Watchlist panel -->
<div id="watchlist-panel">
  <div class="panel-header">
    <h2>📌 Watchlist</h2>
    <button class="icon-btn" onclick="closeWatchlist()" aria-label="Close watchlist">✕</button>
  </div>
  <div class="panel-body" id="watchlist-body"></div>
  <div class="panel-footer">
    <button class="btn btn-ghost" style="width:100%" onclick="exportWatchlistCSV()">⬇ Export Watchlist CSV</button>
  </div>
</div>

<!-- Detail modal -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="icon-btn" onclick="closeModal()" aria-label="Close modal">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
const API = window.TREND_API_URL || 'http://localhost:8000';

// ── State ──────────────────────────────────────────────────────────────────────
let allTrends    = [];
let watchlist    = [];
let currentNiche = '';
let currentView  = 'trends';
let pollTimer    = null;

// ── Clock ──────────────────────────────────────────────────────────────────────
function updateClock() {
  document.getElementById('live-clock').textContent =
    new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

// ── Theme ──────────────────────────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('theme-icon').textContent = next === 'dark' ? '☀️' : '🌙';
}

// ── Mobile sidebar ────────────────────────────────────────────────────────────
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// ── Views ──────────────────────────────────────────────────────────────────────
function switchView(el, view) {
  document.querySelectorAll('[data-view]').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  currentView = view;
  document.getElementById('view-trends').style.display = view === 'trends' ? '' : 'none';
  document.getElementById('view-runs').style.display   = view === 'runs'   ? '' : 'none';
  document.getElementById('page-title').textContent = {trends:'Trends', runs:'Scan History'}[view] || view;
  if (view === 'runs')   loadRuns();
  if (view === 'trends') loadTrends();
  closeSidebar();
}

// ── Auto-poll ──────────────────────────────────────────────────────────────────
function toggleAutoPoll() {
  const on = document.getElementById('auto-poll').checked;
  if (on) {
    pollTimer = setInterval(() => { if (currentView === 'trends') loadTrends(); }, 5 * 60 * 1000);
    showToast('🔄 Auto-refresh ON (every 5 min)');
  } else {
    clearInterval(pollTimer); pollTimer = null;
    showToast('Auto-refresh OFF');
  }
}

// ── Fetch trends ───────────────────────────────────────────────────────────────
async function loadTrends() {
  const hours   = document.getElementById('filter-hours').value   || 24;
  const type    = document.getElementById('filter-type').value;
  const urgency = document.getElementById('filter-urgency').value;
  let url = `${API}/trends?limit=100&since_hours=${hours}`;
  if (currentNiche) url += `&niche=${currentNiche}`;
  if (type)         url += `&signal_type=${type}`;
  if (urgency)      url += `&urgency=${urgency}`;
  showSkeletons();
  try {
    const res  = await fetch(url);
    const data = await res.json();
    allTrends  = data.trends || [];
    renderGrid(allTrends);
    updateKPIs(allTrends, hours);
    updatePageMeta();
  } catch(e) {
    showSkeletons(false);
    document.getElementById('trend-grid').innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="icon">🔌</div>
        <h3>API offline</h3>
        <p>Start the server with <code style="font-family:var(--font-mono);background:var(--surface-3);padding:2px 6px;border-radius:var(--radius-sm)">uvicorn api.main:app --reload</code> then refresh.</p>
      </div>`;
    document.getElementById('page-meta').textContent = 'API offline';
  }
}

async function loadRuns() {
  const tbody = document.getElementById('runs-tbody');
  tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:var(--space-8);color:var(--muted)">Loading…</td></tr>`;
  try {
    const res  = await fetch(`${API}/runs?limit=50`);
    const data = await res.json();
    const runs = data.runs || [];
    if (!runs.length) {
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:var(--space-8);color:var(--muted)">No scan runs yet. Run a scan first.</td></tr>`;
      return;
    }
    tbody.innerHTML = runs.map(r => {
      const start  = r.started_at  ? new Date(r.started_at)  : null;
      const finish = r.finished_at ? new Date(r.finished_at) : null;
      const dur    = (start && finish) ? Math.round((finish - start) / 1000) + 's' : '—';
      const status = finish
        ? `<span class="run-status run-done">✓ Done</span>`
        : `<span class="run-status run-pending">⏳ Running</span>`;
      return `<tr>
        <td style="color:var(--muted)">#${r.id}</td>
        <td>${start  ? start.toLocaleString()  : '—'}</td>
        <td>${finish ? finish.toLocaleString() : '—'}</td>
        <td style="font-family:var(--font-mono)">${dur}</td>
        <td>${r.signal_count  ?? '—'}</td>
        <td>${r.cluster_count ?? '—'}</td>
        <td>${status}</td>
      </tr>`;
    }).join('');
    const done = runs.find(r => r.finished_at);
    if (done) setLastScanKPI(done);
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--high);padding:var(--space-8)">Failed to load runs</td></tr>`;
  }
}

function setLastScanKPI(run) {
  if (!run) return;
  const finish = new Date(run.finished_at);
  const mins   = Math.round((Date.now() - finish) / 60000);
  document.getElementById('kpi-last').textContent     = mins < 60 ? `${mins}m ago` : `${Math.round(mins/60)}h ago`;
  document.getElementById('kpi-last-sub').textContent = `${run.cluster_count ?? 0} clusters`;
}

// ── Scan ───────────────────────────────────────────────────────────────────────
async function runScan() {
  const btn = document.getElementById('scan-btn');
  btn.disabled = true; btn.textContent = '⏳ Scanning…';
  showSkeletons();
  try {
    const qs  = currentNiche ? `?niche=${currentNiche}` : '';
    const res = await fetch(`${API}/scan${qs}`, { method: 'POST' });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    showToast(`✅ Scan complete — run #${data.scan_run_id}`);
    await loadTrends();
    const rRes  = await fetch(`${API}/runs?limit=1`);
    const rData = await rRes.json();
    if (rData.runs?.[0]) setLastScanKPI(rData.runs[0]);
  } catch(e) {
    showToast('❌ Scan failed: ' + e.message);
    showSkeletons(false);
  } finally {
    btn.disabled = false; btn.textContent = '▶ Scan';
  }
}

// ── Render ─────────────────────────────────────────────────────────────────────
function applyFilters() { loadTrends(); }

function setNiche(el, niche) {
  document.querySelectorAll('[data-view]').forEach(n => n.classList.remove('active'));
  document.querySelector('[data-view="trends"]').classList.add('active');
  document.querySelectorAll('[data-niche]').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  currentNiche = niche;
  currentView  = 'trends';
  document.getElementById('view-trends').style.display = '';
  document.getElementById('view-runs').style.display   = 'none';
  const labels = {'':`All Trends`,'commerce':'🛒 Commerce','business':'💡 Business','tech_ai':'🤖 Tech & AI','content':'🎬 Content','general':'🌍 General'};
  document.getElementById('page-title').textContent = labels[niche] || niche;
  closeSidebar();
  loadTrends();
}

function updatePageMeta() {
  const hours = document.getElementById('filter-hours').value || 24;
  document.getElementById('page-meta').textContent =
    `${allTrends.length} trend${allTrends.length !== 1 ? 's' : ''} · last ${hours}h · ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
}

function updateKPIs(trends, hours) {
  document.getElementById('kpi-total').textContent     = trends.length;
  document.getElementById('kpi-total-sub').textContent = `last ${hours}h`;
  document.getElementById('kpi-high').textContent      = trends.filter(t => t.urgency === 'high').length;
  const avg = trends.length ? trends.reduce((a,t) => a + (t.score||0), 0) / trends.length : 0;
  const avgEl = document.getElementById('kpi-avg');
  avgEl.textContent = avg.toFixed(2);
  avgEl.style.color = avg >= 0.70 ? 'var(--high)' : avg >= 0.45 ? 'var(--med)' : 'var(--low)';
}

function showSkeletons(show = true) {
  const grid = document.getElementById('trend-grid');
  if (!show) { grid.innerHTML = ''; return; }
  grid.innerHTML = Array(6).fill(0).map(() => `
    <div class="skeleton-card">
      <div class="skeleton skel-line w-80"></div>
      <div class="skeleton skel-line w-60"></div>
      <div class="skeleton skel-line" style="height:60px"></div>
      <div class="skeleton skel-line w-40"></div>
    </div>`).join('');
}

function renderGrid(trends) {
  const sort   = document.getElementById('filter-sort').value || 'score';
  const q      = (document.getElementById('filter-search').value || '').toLowerCase().trim();
  let filtered = [...trends].sort((a,b) => (b[sort]||0) - (a[sort]||0));
  if (q) {
    filtered = filtered.filter(t =>
      (t.title  || '').toLowerCase().includes(q) ||
      (t.label  || '').toLowerCase().includes(q) ||
      (t.brief  || '').toLowerCase().includes(q) ||
      (t.keywords || []).some(k => k.toLowerCase().includes(q))
    );
  }
  const grid = document.getElementById('trend-grid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="icon">📡</div>
      <h3>${q ? `No results for "${escHtml(q)}"` : 'No trends found'}</h3>
      <p>${q ? 'Try a different keyword.' : 'Run a scan or adjust your filters.'}</p>
    </div>`;
    return;
  }
  grid.innerHTML = filtered.map(t => cardHTML(t)).join('');
}

function barClass(val) {
  if (val >= 0.70) return 'high';
  if (val >= 0.45) return 'med';
  return 'low';
}

function cardHTML(t) {
  const saved   = watchlist.some(w => w.id === t.id);
  const sources = (t.sources||[]).slice(0,5).map(s => `<span class="source-chip">${escHtml(s)}</span>`).join('');
  const ideas   = (t.product_ideas||[]).slice(0,3).map(i => `<div class="idea-item">${escHtml(i)}</div>`).join('');
  const tData   = JSON.stringify(t).replace(/'/g, "&#39;");
  return `
  <article class="trend-card">
    <div class="card-header">
      <div class="card-title">${escHtml(t.title||t.label||'Unnamed')}</div>
      <span class="urgency-badge urgency-${t.urgency||'low'}">${t.urgency||'low'}</span>
    </div>
    <div class="card-meta">
      <span class="badge badge-niche">${nicheEmoji(t.niche)} ${escHtml(t.niche||'general')}</span>
      <span class="badge">${escHtml(t.signal_type||'')}</span>
      ${t.signal_count ? `<span class="badge">${t.signal_count} signals</span>` : ''}
    </div>
    <div class="score-bar">
      ${scoreRow('Score',       t.score)}
      ${scoreRow('Growth',      t.growth)}
      ${scoreRow('Commercial',  t.commercial_intent)}
      ${scoreRow('Novelty',     t.novelty)}
      ${scoreRow('Diversity',   t.source_diversity)}
      ${scoreRow('Persistence', t.persistence)}
    </div>
    ${t.brief  ? `<p class="card-brief">${escHtml(t.brief)}</p>` : ''}
    ${ideas    ? `<div class="card-ideas">${ideas}</div>` : ''}
    ${sources  ? `<div class="card-sources">${sources}</div>` : ''}
    <div class="card-footer">
      <span class="card-score" style="color:${scoreColor(t.score)}">${(t.score||0).toFixed(3)}</span>
      <div class="card-actions">
        <button class="icon-btn ${saved?'saved':''}" aria-label="${saved?'Remove from':'Add to'} watchlist"
          onclick="toggleWatchlist(${t.id})">📌</button>
        <button class="icon-btn" aria-label="View details" onclick='openModal(${tData})'>🔍</button>
      </div>
    </div>
  </article>`;
}

function scoreRow(label, val) {
  const pct = Math.round((val||0) * 100);
  return `<div class="score-row">
    <span class="score-row-label">${label}</span>
    <div class="bar-track"><div class="bar-fill ${barClass(val||0)}" style="width:${pct}%"></div></div>
    <span class="score-num">${(val||0).toFixed(2)}</span>
  </div>`;
}

function scoreColor(s) {
  if (s >= 0.70) return 'var(--high)';
  if (s >= 0.45) return 'var(--med)';
  return 'var(--low)';
}
function nicheEmoji(n) {
  return {'commerce':'🛒','business':'💡','tech_ai':'🤖','content':'🎬','general':'🌍'}[n] || '📌';
}
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Watchlist ──────────────────────────────────────────────────────────────────
function toggleWatchlist(id) {
  const trend = allTrends.find(t => t.id === id);
  if (!trend) return;
  const idx = watchlist.findIndex(w => w.id === id);
  if (idx >= 0) { watchlist.splice(idx,1); showToast('Removed from watchlist'); }
  else          { watchlist.push(trend);   showToast('📌 Added to watchlist'); }
  document.getElementById('wl-count').textContent = watchlist.length;
  renderGrid(allTrends);
  renderWatchlistPanel();
}
function openWatchlist()  { document.getElementById('watchlist-panel').classList.add('open'); }
function closeWatchlist() { document.getElementById('watchlist-panel').classList.remove('open'); }
function renderWatchlistPanel() {
  const body = document.getElementById('watchlist-body');
  if (!watchlist.length) {
    body.innerHTML = `<div class="empty-state"><div class="icon">📌</div><h3>No saved trends</h3><p>Pin trends from the dashboard.</p></div>`;
    return;
  }
  body.innerHTML = watchlist.map(t => `
    <div class="watchlist-item">
      <div>
        <div class="watchlist-item-title">${escHtml(t.title||t.label)}</div>
        <div class="watchlist-item-meta">${nicheEmoji(t.niche)} ${escHtml(t.niche)} · ${t.urgency} · ${(t.score||0).toFixed(3)}</div>
      </div>
      <button class="icon-btn" onclick="toggleWatchlist(${t.id})" aria-label="Remove">✕</button>
    </div>`).join('');
}
function exportWatchlistCSV() {
  if (!watchlist.length) { showToast('Watchlist is empty'); return; }
  const fields = ['id','title','niche','signal_type','urgency','score','brief'];
  const rows   = [fields.join(',')];
  watchlist.forEach(t => rows.push(fields.map(f => `"${String(t[f]||'').replace(/"/g,'""')}"`).join(',')));
  downloadText(rows.join('\n'), 'watchlist.csv', 'text/csv');
  showToast('✅ Watchlist exported');
}

// ── CSV Export ─────────────────────────────────────────────────────────────────
async function exportCSV() {
  const hours = document.getElementById('filter-hours').value || 24;
  let url = `${API}/trends/export/csv?since_hours=${hours}`;
  if (currentNiche) url += `&niche=${currentNiche}`;
  try {
    const res  = await fetch(url);
    const text = await res.text();
    downloadText(text, `trends_${currentNiche||'all'}.csv`, 'text/csv');
    showToast('✅ CSV downloaded');
  } catch(e) {
    showToast('❌ Export failed: ' + e.message);
  }
}
function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime}));
  a.download = filename; a.click();
}

// ── Modal ──────────────────────────────────────────────────────────────────────
function openModal(trend) {
  document.getElementById('modal-title').textContent = trend.title || trend.label || 'Trend';
  const body = document.getElementById('modal-body');
  const scoreSection = `
    <div>
      <div class="modal-section-title">Scores</div>
      ${['score','growth','source_diversity','commercial_intent','novelty','persistence'].map(k =>
        scoreRow(k.replace(/_/g,' '), trend[k]||0)).join('')}
    </div>`;
  const briefSection = trend.brief ? `
    <div>
      <div class="modal-section-title">Brief</div>
      <p style="font-size:var(--text-sm);line-height:1.7">${escHtml(trend.brief)}</p>
    </div>` : '';
  const ideasSection = (trend.product_ideas||[]).length ? `
    <div>
      <div class="modal-section-title">Product Ideas</div>
      <div class="card-ideas">${(trend.product_ideas||[]).map(i=>`<div class="idea-item">${escHtml(i)}</div>`).join('')}</div>
    </div>` : '';
  const planSection = (trend.action_plan||[]).length ? `
    <div>
      <div class="modal-section-title">Action Plan</div>
      <div class="action-list">${(trend.action_plan||[]).map(s=>`<div class="action-step">${escHtml(s)}</div>`).join('')}</div>
    </div>` : '';
  const evidenceSection = (trend.evidence_urls||[]).length ? `
    <div>
      <div class="modal-section-title">Evidence URLs</div>
      <div class="evidence-list">${(trend.evidence_urls||[]).map(u=>
        `<a class="evidence-url" href="${escHtml(u)}" target="_blank" rel="noopener">${escHtml(u)}</a>`).join('')}</div>
    </div>` : '';
  const kwSection = (trend.keywords||[]).length ? `
    <div>
      <div class="modal-section-title">Keywords</div>
      <div class="card-sources">${(trend.keywords||[]).map(k=>`<span class="source-chip">${escHtml(k)}</span>`).join('')}</div>
    </div>` : '';
  body.innerHTML = [scoreSection, briefSection, ideasSection, planSection, evidenceSection, kwSection].join('');
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeWatchlist(); closeSidebar(); }
});

// ── Toast ──────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast-msg'; el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// ── Init ───────────────────────────────────────────────────────────────────────
(async function init() {
  showSkeletons();
  await Promise.allSettled([
    loadTrends(),
    (async () => {
      try {
        const r = await fetch(`${API}/runs?limit=1`);
        const d = await r.json();
        if (d.runs?.[0]) setLastScanKPI(d.runs[0]);
      } catch(_) {}
    })()
  ]);
})();
</script>
</body>
</html>
