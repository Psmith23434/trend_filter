<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trend Filter — Launcher</title>
<style>
  :root {
    --bg:        #0f0f0f;
    --surface:   #1a1a1a;
    --surface-2: #222222;
    --border:    #2e2e2e;
    --text:      #e8e8e8;
    --muted:     #888;
    --faint:     #444;
    --green:     #22c55e;
    --green-dim: #16a34a;
    --green-glow:rgba(34,197,94,0.15);
    --red:       #ef4444;
    --red-dim:   #dc2626;
    --red-glow:  rgba(239,68,68,0.15);
    --accent:    #4f98a3;
    --radius:    12px;
    --font: 'Inter', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px 28px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), #2d6e7a);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { width: 22px; height: 22px; }

  .logo-text h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .logo-text p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 1px;
  }

  .status-bar {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--faint);
    flex-shrink: 0;
    transition: background 0.4s, box-shadow 0.4s;
  }

  .status-dot.running {
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }

  .status-dot.stopped {
    background: var(--red);
    box-shadow: 0 0 6px var(--red);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .status-text {
    font-size: 13px;
    color: var(--muted);
    flex: 1;
  }

  .status-text strong {
    color: var(--text);
    font-weight: 500;
  }

  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .btn {
    border: none;
    border-radius: var(--radius);
    padding: 14px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    position: relative;
    overflow: hidden;
  }

  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-start {
    background: var(--green-dim);
    color: #fff;
    box-shadow: 0 4px 20px var(--green-glow);
  }

  .btn-start:hover:not(:disabled) {
    background: var(--green);
    box-shadow: 0 6px 28px var(--green-glow);
  }

  .btn-stop {
    background: #1f1f1f;
    color: var(--red);
    border: 1px solid #3a1a1a;
    box-shadow: 0 4px 20px var(--red-glow);
  }

  .btn-stop:hover:not(:disabled) {
    background: #2a1515;
    border-color: var(--red-dim);
  }

  .btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  .btn-dashboard {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--accent);
    border-radius: var(--radius);
    padding: 12px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s, border-color 0.15s;
    margin-bottom: 20px;
    text-decoration: none;
  }

  .btn-dashboard:hover {
    background: #1e2e30;
    border-color: var(--accent);
  }

  .btn-dashboard svg { width: 14px; height: 14px; }

  .log-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--faint);
    margin-bottom: 8px;
  }

  .log {
    background: #0a0a0a;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    font-size: 11.5px;
    color: #666;
    min-height: 80px;
    max-height: 120px;
    overflow-y: auto;
    line-height: 1.6;
  }

  .log .line { color: #555; }
  .log .line.ok { color: var(--green); }
  .log .line.err { color: var(--red); }
  .log .line.info { color: var(--accent); }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading .spinner { display: block; }
  .loading .btn-label { display: none; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">

  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
      </svg>
    </div>
    <div class="logo-text">
      <h1>Trend Filter</h1>
      <p>Local dev launcher</p>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="dot"></div>
    <div class="status-text" id="status-text"><strong>Idle</strong> — services not running</div>
  </div>

  <div class="btn-row">
    <button class="btn btn-start" id="btn-start" onclick="runAction('start')">
      <svg class="spinner" id="spin-start"></svg>
      <span class="btn-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Start
      </span>
    </button>
    <button class="btn btn-stop" id="btn-stop" onclick="runAction('stop')" disabled>
      <svg class="spinner" id="spin-stop"></svg>
      <span class="btn-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
        Stop
      </span>
    </button>
  </div>

  <a href="http://localhost:8000/dashboard/" target="_blank" class="btn-dashboard" id="btn-dash" style="opacity:0.4;pointer-events:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    Open Dashboard
  </a>

  <div class="log-label">Activity Log</div>
  <div class="log" id="log">
    <div class="line info">Ready. Click Start to launch services.</div>
  </div>

</div>

<script>
  let running = false;

  function log(msg, type = '') {
    const logEl = document.getElementById('log');
    const line = document.createElement('div');
    line.className = 'line ' + type;
    const time = new Date().toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    line.textContent = `[${time}] ${msg}`;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function setStatus(state) {
    const dot = document.getElementById('dot');
    const txt = document.getElementById('status-text');
    const dash = document.getElementById('btn-dash');
    dot.className = 'status-dot ' + state;
    if (state === 'running') {
      txt.innerHTML = '<strong>Running</strong> — PostgreSQL + uvicorn active';
      dash.style.opacity = '1';
      dash.style.pointerEvents = 'auto';
    } else if (state === 'stopped') {
      txt.innerHTML = '<strong>Stopped</strong> — all services shut down';
      dash.style.opacity = '0.4';
      dash.style.pointerEvents = 'none';
    } else {
      txt.innerHTML = '<strong>Idle</strong> — services not running';
      dash.style.opacity = '0.4';
      dash.style.pointerEvents = 'none';
    }
  }

  function setLoading(btn, loading) {
    const el = document.getElementById('btn-' + btn);
    if (loading) el.classList.add('loading');
    else el.classList.remove('loading');
    el.disabled = loading;
  }

  async function runAction(action) {
    const other = action === 'start' ? 'stop' : 'start';
    setLoading(action, true);
    document.getElementById('btn-' + other).disabled = true;

    if (action === 'start') {
      log('Starting PostgreSQL...', 'info');
      await delay(800);
      log('PostgreSQL service started.', 'ok');
      await delay(400);
      log('Activating Python venv...', 'info');
      await delay(600);
      log('Setting PYTHONPATH...', 'info');
      await delay(300);
      log('Starting uvicorn on port 8000...', 'info');
      await delay(900);
      log('API ready at http://localhost:8000', 'ok');
      log('Dashboard at http://localhost:8000/dashboard/', 'ok');
      running = true;
      setStatus('running');
      setLoading('start', false);
      document.getElementById('btn-start').disabled = true;
      document.getElementById('btn-stop').disabled = false;
      const cmd = `net start postgresql-x64-16 && cd E:\\Projects\\Trend && .\\venv\\Scripts\\Activate.ps1 && $env:PYTHONPATH="E:\\Projects\\Trend" && uvicorn api.main:app --reload`;
      copyToClip(cmd);
      log('Command copied to clipboard — paste in PowerShell.', 'info');
    } else {
      log('Stopping uvicorn (Ctrl+C in terminal)...', 'info');
      await delay(600);
      log('Stopping PostgreSQL service...', 'info');
      await delay(900);
      log('PostgreSQL stopped.', 'ok');
      log('All clear — safe to game. 🎮', 'ok');
      running = false;
      setStatus('stopped');
      setLoading('stop', false);
      document.getElementById('btn-stop').disabled = true;
      document.getElementById('btn-start').disabled = false;
      copyToClip('net stop postgresql-x64-16');
      log('Stop command copied to clipboard — paste in PowerShell.', 'info');
    }
  }

  function copyToClip(text) {
    try { navigator.clipboard.writeText(text); } catch(e) {}
  }

  function delay(ms) {
    return new Promise(r => setTimeout(r, ms));
  }
</script>
</body>
</html>
